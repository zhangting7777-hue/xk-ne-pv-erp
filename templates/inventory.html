{% extends "base.html" %}
{% block title %}库存管理 - 鑫科新能源ERP{% endblock %}
{% block page %}
<div class="page-title">📦 库存物料管理</div>

<div class="two-col" style="margin-bottom:16px">
  <div class="metric-card"><div class="mlabel">物料种类</div><div class="mvalue" id="m-count">-</div><div class="munit">种</div></div>
  <div class="metric-card orange"><div class="mlabel">库存预警</div><div class="mvalue" id="m-warn">-</div><div class="munit">种物料不足</div></div>
</div>

<div class="card">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openAddMat()">+ 新增物料</button>
  </div>
  <table class="data-table">
    <thead>
      <tr><th>物料名称</th><th>类别</th><th>单位</th><th>单价(元)</th><th>供应商</th><th>库存</th><th>安全库存</th><th>状态</th><th>操作</th></tr>
    </thead>
    <tbody id="matTable"></tbody>
  </table>
</div>

<div class="card" style="margin-top:16px">
  <div class="card-title">📋 物料出入库流水</div>
  <table class="data-table">
    <thead><tr><th>日期</th><th>物料</th><th>项目</th><th>类型</th><th>数量</th><th>单价</th><th>金额(万)</th></tr></thead>
    <tbody id="flowTable"></tbody>
  </table>
</div>

<!-- 新增物料 -->
<div class="modal-overlay" id="matModal">
  <div class="modal">
    <div class="modal-header"><h3>新增物料</h3><button class="modal-close" onclick="closeMat()">×</button></div>
    <div class="form-row">
      <div class="form-group"><label>物料名称 *</label><input id="m_name" placeholder="如：光伏组件"></div>
      <div class="form-group"><label>类别</label>
        <select id="m_cat"><option>组件</option><option>逆变器</option><option>支架</option><option>线缆</option><option>配电箱</option><option>其他</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>单位</label><input id="m_unit" value="块"></div>
      <div class="form-group"><label>单价(元)</label><input type="number" id="m_price" step="0.01"></div>
      <div class="form-group"><label>供应商</label><input id="m_supplier"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>当前库存</label><input type="number" id="m_stock" step="1" value="0"></div>
      <div class="form-group"><label>安全库存</label><input type="number" id="m_safe" step="1" value="10"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeMat()">取消</button>
      <button class="btn btn-primary" onclick="submitMat()">确认</button>
    </div>
  </div>
</div>

<!-- 出入库 -->
<div class="modal-overlay" id="flowModal">
  <div class="modal">
    <div class="modal-header"><h3>物料出入库</h3><button class="modal-close" onclick="closeFlow()">×</button></div>
    <div class="form-row">
      <div class="form-group"><label>选择物料</label><select id="f_mat"><option value="">请选择</option></select></div>
      <div class="form-group"><label>类型</label>
        <select id="f_type"><option>入库</option><option>出库</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>数量</label><input type="number" id="f_qty" step="1"></div>
      <div class="form-group"><label>单价(元)</label><input type="number" id="f_price" step="0.01"></div>
      <div class="form-group"><label>日期</label><input type="date" id="f_date"></div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2"><label>关联项目（可选）</label>
        <select id="f_proj"><option value="">无关联项目</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeFlow()">取消</button>
      <button class="btn btn-primary" onclick="submitFlow()">确认</button>
    </div>
  </div>
</div>

<script>
async function loadMaterials(){
  const r = await fetch('/api/materials');
  const list = await r.json();
  document.getElementById('m-count').textContent = list.length;
  const warn = list.filter(m=>m.stock_qty < m.safe_stock).length;
  document.getElementById('m-warn').textContent = warn;
  document.getElementById('matTable').innerHTML = list.map(m=>`
    <tr class="${m.stock_qty < m.safe_stock?'warning':''}">
      <td><b>${m.name}</b></td><td>${m.category}</td><td>${m.unit}</td>
      <td>${m.unit_price}</td><td>${m.supplier||'-'}</td>
      <td style="font-weight:700;color:${m.stock_qty<m.safe_stock?'var(--red)':'var(--xk-green)'}">${m.stock_qty}</td>
      <td>${m.safe_stock}</td>
      <td><span class="badge badge-${m.stock_qty<m.safe_stock?'red':'green'}">${m.stock_qty<m.safe_stock?'⚠库存不足':'正常'}</span></td>
      <td><button class="btn btn-outline btn-sm" onclick="openFlow(${m.id})">出入库</button></td>
    </tr>
  `).join('');

  document.getElementById('f_mat').innerHTML = '<option value="">请选择</option>' +
    list.map(m=>`<option value="${m.id}">${m.name} (库存:${m.stock_qty}${m.unit})</option>`).join('');
}

async function loadFlows(){
  const r = await fetch('/api/material-flows');
  const list = await r.json();
  document.getElementById('flowTable').innerHTML = list.map(f=>`
    <tr>
      <td>${f.flow_date||'-'}</td><td>${f.material_name||'-'}</td>
      <td>${f.project_name||'-'}</td>
      <td><span class="badge badge-${f.flow_type==='入库'?'green':'orange'}">${f.flow_type}</span></td>
      <td>${f.qty}</td><td>${f.price}</td>
      <td>${(f.qty*f.price/10000).toFixed(4)}</td>
    </tr>
  `).join('');
}

function openAddMat(){ document.getElementById('matModal').classList.add('show'); }
function closeMat(){ document.getElementById('matModal').classList.remove('show'); }
async function submitMat(){
  await fetch('/api/materials', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name: document.getElementById('m_name').value,
      category: document.getElementById('m_cat').value,
      unit: document.getElementById('m_unit').value,
      unit_price: parseFloat(document.getElementById('m_price').value)||0,
      supplier: document.getElementById('m_supplier').value,
      stock_qty: parseFloat(document.getElementById('m_stock').value)||0,
      safe_stock: parseFloat(document.getElementById('m_safe').value)||10,
    })});
  closeMat(); loadMaterials();
}

async function openFlow(matId){
  document.getElementById('f_mat').value = matId || '';
  document.getElementById('flowModal').classList.add('show');
  // load projects for dropdown
  const rp = await fetch('/api/projects');
  const projs = await rp.json();
  document.getElementById('f_proj').innerHTML = '<option value="">无关联项目</option>' +
    projs.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
}
function closeFlow(){ document.getElementById('flowModal').classList.remove('show'); }
async function submitFlow(){
  await fetch('/api/material-flows', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      material_id: parseInt(document.getElementById('f_mat').value),
      project_id: parseInt(document.getElementById('f_proj').value)||null,
      flow_type: document.getElementById('f_type').value,
      qty: parseFloat(document.getElementById('f_qty').value)||0,
      price: parseFloat(document.getElementById('f_price').value)||0,
      flow_date: document.getElementById('f_date').value,
    })});
  closeFlow(); loadMaterials(); loadFlows();
}

loadMaterials(); loadFlows();
</script>
{% endblock %}
